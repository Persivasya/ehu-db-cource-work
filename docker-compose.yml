services:
  postgres:
    image: postgres:16
    container_name: logistics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: logistics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./csv_data:/csv_data:ro
      - ./logistics_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./dwh_schema.sql:/docker-entrypoint-initdb.d/02_dwh_schema.sql:ro
      - ./load_csv.sql:/docker-entrypoint-initdb.d/03_load_func.sql:ro
      - ./migrate_to_dwh.sql:/docker-entrypoint-initdb.d/04_migrate_to_dwh.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logistics"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: logistics_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin_servers.json:/pgadmin4/servers.json:ro
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
